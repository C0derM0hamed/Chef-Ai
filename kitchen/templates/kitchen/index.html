<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chef Assistant</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: linear-gradient(160deg, #f8fafc 0%, #e8f4f0 50%, #f3f0ff 100%);
      }
      .hero-title {
        letter-spacing: -0.02em;
        color: #1a2f25;
      }
      .card {
        border: none;
        box-shadow: 0 0.5rem 1.25rem rgba(15, 60, 45, 0.08);
        border-radius: 1rem;
      }
      .input-surface {
        max-width: 32rem;
        border-radius: 1rem;
        box-shadow: 0 0.25rem 1rem rgba(15, 60, 45, 0.06);
      }
    </style>
  </head>
  <body>
    <div class="container py-5">
      <div class="text-center mb-4">
        <h1 class="hero-title display-5 fw-semibold">AI Chef Assistant</h1>
        <p class="text-secondary mb-0">Enter what you have on hand — we’ll suggest meals.</p>
      </div>

      <form
        id="chef-form"
        class="d-flex flex-column align-items-center mb-4"
        method="post"
        action="{% url 'chef_assistant' %}"
      >
        {% csrf_token %}
        <div class="w-100 input-surface bg-white p-4 border border-light">
          <label for="ingredients" class="form-label small text-muted mb-1"
            >Ingredients</label
          >
          <textarea
            class="form-control"
            id="ingredients"
            name="ingredients"
            rows="3"
            placeholder="e.g. chicken, rice, lemon, garlic…"
            required
          ></textarea>
          <div class="d-flex justify-content-center mt-3">
            <button type="submit" class="btn btn-success btn-lg px-5 rounded-pill">
              Suggest meals
            </button>
          </div>
        </div>
      </form>

      <p
        id="loading"
        class="text-center text-secondary fw-medium mb-3"
        hidden
      >
        Generating meal ideas for you…
      </p>

      <div id="results" class="row g-3 justify-content-center"></div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      const form = document.getElementById("chef-form");
      const loading = document.getElementById("loading");
      const results = document.getElementById("results");

      function renderError(msg) {
        results.innerHTML =
          '<div class="col-12 col-md-8"><div class="alert alert-danger" role="alert">' +
          msg +
          "</div></div>";
      }

      function renderMeals(meals) {
  results.innerHTML = "";

  if (!meals || meals.length === 0) {
    results.innerHTML =
      '<p class="text-center text-secondary">No meals returned. Try different ingredients.</p>';
    return;
  }

  meals.forEach((m) => {
    const col = document.createElement("div");
    col.className = "col-12 col-md-6 col-lg-5";

    const time = m.cooking_time ? m.cooking_time + " min" : "—";
    const servings = m.servings || "—";

   
    const ingredients = (m.ingredients || [])
      .map(
        (i) =>
          `<li>${i.name} ${
            i.status === "available" ? "yes" : "no"
          }</li>`
      )
      .join("");

   
    const steps = (m.instructions || [])
      .map(
        (s) =>
          `<li class="mb-1">${s
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")}</li>`
      )
      .join("");

    col.innerHTML =
      `<div class="card h-100">
        <div class="card-body d-flex flex-column">

          <h2 class="card-title h5 mb-1">${m.name || "Meal"}</h2>

          <p class="small text-muted mb-1">
            Cooking Time: ${time}
          </p>

          <p class="small text-muted mb-2">
             Servings: ${servings}
          </p>

          <h6>Ingredients:</h6>
          <ul class="small">
            ${ingredients}
          </ul>

          <h6>Instructions:</h6>
          <ol class="ps-3 mb-0 small flex-grow-1">
            ${steps}
          </ol>

        </div>
      </div>`;

    results.appendChild(col);
  });
}

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        const csrf = document.querySelector(
          "[name=csrfmiddlewaretoken]"
        ).value;
        loading.hidden = false;
        results.innerHTML = "";
        try {
          const res = await fetch(form.action, {
            method: "POST",
            headers: { "X-CSRFToken": csrf },
            body: fd,
          });
          const data = await res.json();
          loading.hidden = true;
          if (data.error) {
            renderError(data.error);
            return;
          }
          renderMeals(data.meals);
        } catch (err) {
          loading.hidden = true;
          renderError("Something went wrong. Check your network and try again.");
        }
      });
    </script>
  </body>
</html>
